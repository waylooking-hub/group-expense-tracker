name: Deploy to Vercel
on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --global vercel@latest
      - name: Link to existing project
        run: vercel link --yes --project group-expense-tracker --token=$VERCEL_TOKEN
      - name: Set env vars
        run: |
          echo "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" | vercel env add NEXT_PUBLIC_SUPABASE_URL production --yes --token=$VERCEL_TOKEN 2>/dev/null || true
          echo "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" | vercel env add NEXT_PUBLIC_SUPABASE_ANON_KEY production --yes --token=$VERCEL_TOKEN 2>/dev/null || true
      - name: Deploy to production
        run: vercel deploy --prod --yes --token=$VERCEL_TOKEN 2>&1 | tee /tmp/deploy.log
      - name: Report result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/deploy.log', 'utf8');
            const urls = log.match(/https:\/\/[a-z0-9-]+\.vercel\.app/g) || [];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Deploy #' + context.runNumber,
              body: `URLs: ${urls.join(', ') || 'none found'}\n\n\`\`\`\n${log.slice(-2000)}\n\`\`\``
            });
