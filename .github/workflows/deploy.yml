name: Deploy to Vercel
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm install --global vercel@latest
      - name: Pull Vercel config
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
      - name: Build
        run: vercel build --prod --token=$VERCEL_TOKEN
      - name: List output
        if: always()
        run: ls -la .vercel/output/ 2>/dev/null || echo "No .vercel/output"
      - name: Deploy
        id: deploy
        continue-on-error: true
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN 2>&1 | tee /tmp/deploy.log
      - name: Report error
        if: steps.deploy.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/deploy.log', 'utf8').slice(-2000);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Deploy error log',
              body: '```\n' + log + '\n```'
            });
            core.setFailed('Deploy failed');
