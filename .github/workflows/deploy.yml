name: Deploy to Vercel
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --global vercel@latest
      - name: Deploy to production
        run: vercel deploy --prod --yes --token=$VERCEL_TOKEN 2>&1 | tee /tmp/deploy.log
      - name: Report URL
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/deploy.log', 'utf8');
            const urls = log.match(/https:\/\/[a-z0-9-]+\.vercel\.app/g) || [];
            const allOutput = log.slice(-3000);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Deploy result - Run #' + context.runNumber,
              body: `## URLs found\n${urls.map(u => '- ' + u).join('\n') || 'None'}\n\n## Full output\n\`\`\`\n${allOutput}\n\`\`\``
            });
