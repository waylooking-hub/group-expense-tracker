name: Deploy to Vercel
on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --global vercel@latest
      - name: Link to project
        run: vercel link --yes --project group-expense-tracker --token=$VERCEL_TOKEN
      - name: Fix root directory
        run: |
          PROJECT_ID=$(cat .vercel/project.json | python3 -c "import sys,json; print(json.load(sys.stdin)['projectId'])")
          echo "Project ID: $PROJECT_ID"
          curl -s -X PATCH "https://api.vercel.com/v9/projects/$PROJECT_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"rootDirectory": null}' | python3 -c "import sys,json; d=json.load(sys.stdin); print('Root dir set to:', d.get('rootDirectory', 'null'))"
      - name: Deploy to production
        run: vercel deploy --prod --yes --token=$VERCEL_TOKEN 2>&1 | tee /tmp/deploy.log
      - name: Report result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/deploy.log', 'utf8');
            const urls = log.match(/https:\/\/[a-z0-9.-]+\.vercel\.app/g) || [];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Deploy #' + context.runNumber,
              body: `URLs: ${urls.join(', ') || 'none'}\n\n\`\`\`\n${log.slice(-2000)}\n\`\`\``
            });
