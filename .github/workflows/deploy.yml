name: Deploy to Vercel
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --global vercel@latest
      - name: Pull Vercel config
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
      - name: Inject env vars
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> .vercel/.env.production.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .vercel/.env.production.local
      - name: Build
        run: vercel build --prod --token=$VERCEL_TOKEN
      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
